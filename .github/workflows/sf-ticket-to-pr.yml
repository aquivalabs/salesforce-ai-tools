name: SF Ticket to PR

run-name: "Ticket #${{ github.event.issue.number || github.event.pull_request.number }}: ${{ github.event.issue.title || github.event.pull_request.title }}"

# Mention-driven AI workflow. Fires when an Aquiva collaborator (or higher)
# writes "@butler" in an issue body, issue comment, PR review, or PR review
# comment. The first pass posts a plan and waits. Follow-up human comments on a
# pending plan also wake the agent so it can read the answer naturally and decide
# whether the current plan is approved, corrected, ambiguous, or rejected.
#
# Cost protection: a cheap gate job verifies the triggering user has write,
# maintain, or admin permission before the Claude-backed triage job runs.
# Bot-authored events are also dropped so the agent can't summon itself.
#
# The only label still in use is `ai-involved`, applied by the agent when it
# opens a PR. It's purely informational — humans can filter the PR list by it.

on:
  workflow_call:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

jobs:
  gate:
    name: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
    outputs:
      proceed: ${{ steps.gate.outputs.proceed }}
    steps:
      - name: Check trigger and actor permission
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_USER: ${{ github.event.issue.user.login }}
          ISSUE_USER_TYPE: ${{ github.event.issue.user.type }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
          COMMENT_USER_TYPE: ${{ github.event.comment.user.type }}
          REVIEW_BODY: ${{ github.event.review.body }}
          REVIEW_USER: ${{ github.event.review.user.login }}
          REVIEW_USER_TYPE: ${{ github.event.review.user.type }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          BODY=""
          ACTOR=""
          ACTOR_TYPE=""
          NUMBER=""

          case "$EVENT_NAME" in
            issues)
              BODY="$ISSUE_BODY"
              ACTOR="$ISSUE_USER"
              ACTOR_TYPE="$ISSUE_USER_TYPE"
              NUMBER="$ISSUE_NUMBER"
              ;;
            issue_comment)
              BODY="$COMMENT_BODY"
              ACTOR="$COMMENT_USER"
              ACTOR_TYPE="$COMMENT_USER_TYPE"
              NUMBER="$ISSUE_NUMBER"
              ;;
            pull_request_review_comment)
              BODY="$COMMENT_BODY"
              ACTOR="$COMMENT_USER"
              ACTOR_TYPE="$COMMENT_USER_TYPE"
              NUMBER="$PR_NUMBER"
              ;;
            pull_request_review)
              BODY="$REVIEW_BODY"
              ACTOR="$REVIEW_USER"
              ACTOR_TYPE="$REVIEW_USER_TYPE"
              NUMBER="$PR_NUMBER"
              ;;
          esac

          if [ "$ACTOR_TYPE" = "Bot" ]; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Ignoring bot-authored event."
            exit 0
          fi

          PERMISSION=$(gh api "/repos/$REPO/collaborators/$ACTOR/permission" --jq .permission 2>/dev/null || echo "none")
          case "$PERMISSION" in
            admin|maintain|write)
              if [[ "$BODY" == *"@butler"* ]]; then
                echo "proceed=true" >> "$GITHUB_OUTPUT"
                echo "::notice::Accepted @butler trigger from $ACTOR with $PERMISSION permission."
                exit 0
              fi

              if [ -n "$NUMBER" ] && [ "$EVENT_NAME" != "issues" ]; then
                LAST_BOT=$(gh api "/repos/$REPO/issues/$NUMBER/comments" --jq 'map(select(.user.type == "Bot")) | last.body // ""' 2>/dev/null || true)
                if echo "$LAST_BOT" | grep -q 'butler:plan status=pending'; then
                  echo "proceed=true" >> "$GITHUB_OUTPUT"
                  echo "::notice::Accepted follow-up comment from $ACTOR on pending Butler plan."
                  exit 0
                fi
              fi

              echo "proceed=false" >> "$GITHUB_OUTPUT"
              echo "::notice::No @butler mention and no pending Butler plan."
              ;;
            *)
              echo "proceed=false" >> "$GITHUB_OUTPUT"
              echo "::notice::Ignoring @butler trigger from $ACTOR with $PERMISSION permission."
              ;;
          esac

  # Cheap first pass: read the thread, post a plan, and wait for human approval.
  # Follow-up human comments on a pending plan also come through this job. The
  # execute job only starts when the agent determines that the latest human
  # response clearly approves the current plan.
  triage:
    name: triage
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    outputs:
      proceed: ${{ steps.outcome.outputs.proceed }}
      kind: ${{ steps.context.outputs.kind }}
      number: ${{ steps.context.outputs.number }}
      pr_branch: ${{ steps.context.outputs.pr_branch }}
      scratch_key: ${{ steps.context.outputs.scratch_key }}
      plan: ${{ steps.outcome.outputs.plan }}
    steps:
      - uses: actions/checkout@v6

      - name: Checkout salesforce-ai-tools (plugin + scripts)
        uses: actions/checkout@v6
        with:
          repository: aquivalabs/salesforce-ai-tools
          path: .sf-ai-tools

      - name: Install Claude Code CLI
        run: npm install --global @anthropic-ai/claude-code

      - name: Install salesforce-ai-tools plugin
        run: .sf-ai-tools/scripts/install-sf-ai-tools.sh --scope local --source ./.sf-ai-tools

      # Normalize the event into a few simple variables: is this an issue or a
      # PR? what's the number? if it's a PR, what's the head branch? The agent
      # and the execute job both want this without re-deriving it from each
      # event shape.
      - name: Resolve context
        id: context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            NUMBER="${{ github.event.pull_request.number }}"
            KIND=pr
          elif [ -n "${{ github.event.issue.pull_request.url }}" ]; then
            NUMBER="${{ github.event.issue.number }}"
            KIND=pr
          else
            NUMBER="${{ github.event.issue.number }}"
            KIND=issue
          fi
          PR_BRANCH=""
          # Scratch-org alias must be stable across issue runs and PR follow-ups so
          # the same per-PR org is reused. For PR events, resolve the linked issue
          # number from `Closes #N` / `Fixes #N` / `Resolves #N` in the PR body and
          # use that as the key. Falls back to the event number if no link exists.
          SCRATCH_KEY="$NUMBER"
          if [ "$KIND" = "pr" ]; then
            PR_DATA=$(gh pr view "$NUMBER" --repo ${{ github.repository }} --json headRefName,body)
            PR_BRANCH=$(echo "$PR_DATA" | jq -r '.headRefName')
            PR_BODY=$(echo "$PR_DATA" | jq -r '.body')
            LINKED=$(echo "$PR_BODY" | grep -oiE '(close[sd]?|fix(e[sd])?|resolve[sd]?) #[0-9]+' | grep -oE '[0-9]+' | head -n 1 || true)
            if [ -n "$LINKED" ]; then
              SCRATCH_KEY="$LINKED"
            fi
          fi
          echo "kind=$KIND" >> $GITHUB_OUTPUT
          echo "number=$NUMBER" >> $GITHUB_OUTPUT
          echo "pr_branch=$PR_BRANCH" >> $GITHUB_OUTPUT
          echo "scratch_key=$SCRATCH_KEY" >> $GITHUB_OUTPUT
          echo "::notice::context kind=$KIND number=$NUMBER scratch_key=$SCRATCH_KEY branch=$PR_BRANCH"

      - name: Decide
        uses: anthropics/claude-code-action@v1
        id: claude
        with:
          prompt: |
            Follow the `salesforce-ai-tools:sf-ticket-to-pr` plugin skill — Step 1 only.

            Context: ${{ steps.context.outputs.kind }} #${{ steps.context.outputs.number }} in ${{ github.repository }}.

            This is the triage job. No Salesforce CLI or scratch org is available.
            Do not code, deploy, or verify. Read the thread, decide, post one
            GitHub comment, stop.
          claude_args: "--max-turns 30 --model claude-opus-4-7 --permission-mode bypassPermissions"
          show_full_output: "true"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # Detect the execute marker by scanning the last bot comment posted on
      # the issue or PR. Plan and execute markers are HTML comments so they
      # render invisibly in GitHub but are trivially greppable here.
      - name: Determine outcome
        id: outcome
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUMBER: ${{ steps.context.outputs.number }}
        run: |
          COMMENTS=$(gh api "/repos/${{ github.repository }}/issues/$NUMBER/comments")
          LAST=$(echo "$COMMENTS" | jq -r 'map(select(.user.type == "Bot")) | last.body // ""')
          PLAN=$(echo "$COMMENTS" | jq -r 'map(select(.user.type == "Bot" and (.body | contains("butler:plan status=pending")))) | last.body // ""')
          if echo "$LAST" | grep -q 'butler:execute'; then
            echo "::notice::Triage outcome: approved — execute job will run."
            echo "proceed=true" >> $GITHUB_OUTPUT
            { echo "plan<<EOF_PLAN"; echo "$PLAN"; echo "EOF_PLAN"; } >> $GITHUB_OUTPUT
          else
            echo "::notice::Triage outcome: waiting — execute job will be skipped."
            echo "proceed=false" >> $GITHUB_OUTPUT
          fi

      - name: Report AI cost
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.context.outputs.scratch_key }}
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: .sf-ai-tools/.github/scripts/report-ai-cost.sh || echo "::warning::cost report failed"

      # Mark the issue/PR with `ai-involved` so humans see at a glance that
      # Butler touched this thread. Purely visual — never gates anything.
      - name: Stamp ai-involved label
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUMBER: ${{ steps.context.outputs.number }}
          KIND: ${{ steps.context.outputs.kind }}
        run: |
          if [ "$KIND" = "pr" ]; then
            gh pr edit "$NUMBER" --repo ${{ github.repository }} --add-label ai-involved || true
          else
            gh issue edit "$NUMBER" --repo ${{ github.repository }} --add-label ai-involved || true
          fi

      - name: Notify on triage failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUMBER: ${{ steps.context.outputs.number }}
          KIND: ${{ steps.context.outputs.kind }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_ISSUE_PR_URL: ${{ github.event.issue.pull_request.url }}
        run: |
          if [ -z "$NUMBER" ]; then
            NUMBER="${EVENT_ISSUE_NUMBER:-${EVENT_PR_NUMBER:-}}"
          fi
          if [ -z "$KIND" ]; then
            if [ -n "${EVENT_PR_NUMBER:-}" ] || [ -n "${EVENT_ISSUE_PR_URL:-}" ]; then
              KIND=pr
            else
              KIND=issue
            fi
          fi
          if [ -z "$NUMBER" ]; then
            echo "::warning::Could not resolve issue/PR number for triage failure notification."
            exit 0
          fi
          if [ "$KIND" = "pr" ]; then
            gh pr comment "$NUMBER" --repo ${{ github.repository }} --body "Triage failed before I could decide. See the [run logs]($RUN_URL). Mention me again to retry."
          else
            gh issue comment "$NUMBER" --repo ${{ github.repository }} --body "Triage failed before I could decide. See the [run logs]($RUN_URL). Mention me again to retry."
          fi

  execute:
    name: execute
    needs: triage
    if: needs.triage.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    # Serialize runs that target the same scratch org so two mentions don't
    # race. scratch_key is the issue number (resolved from `Closes #N` on PR
    # events) — the alias `pr-<issue-number>` stays stable across the issue
    # run and every PR follow-up.
    concurrency:
      group: scratch-org-${{ needs.triage.outputs.scratch_key }}
      cancel-in-progress: false
    env:
      KIND: ${{ needs.triage.outputs.kind }}
      NUMBER: ${{ needs.triage.outputs.number }}
      PR_BRANCH: ${{ needs.triage.outputs.pr_branch }}
      SCRATCH_ORG_ALIAS: pr-${{ needs.triage.outputs.scratch_key }}
      ISSUE_NUMBER: ${{ needs.triage.outputs.scratch_key }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      # Issue path: branch off main. PR path: check out the PR's head branch.
      # Both use full history so the agent can read prior commits if needed.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.triage.outputs.kind == 'pr' && needs.triage.outputs.pr_branch || '' }}

      - name: Checkout salesforce-ai-tools (plugin + scripts)
        uses: actions/checkout@v6
        with:
          repository: aquivalabs/salesforce-ai-tools
          path: .sf-ai-tools

      - name: Install Claude Code CLI
        run: npm install --global @anthropic-ai/claude-code

      - name: Install salesforce-ai-tools plugin
        run: .sf-ai-tools/scripts/install-sf-ai-tools.sh --scope local --source ./.sf-ai-tools

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create branch for new issue
        if: needs.triage.outputs.kind == 'issue'
        run: git checkout -b "fix/issue-${{ needs.triage.outputs.number }}"

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      # Chromium for Playwright-driven UI verification. The agent only fires
      # it up for user-visible changes (see playwright-sf skill); install is
      # unconditional so the binary is always available when the model decides
      # to use it. ffmpeg ships too so video verification can convert the
      # recorded WebM to MP4 without an in-run apt install.
      - name: Install Playwright Chromium and ffmpeg
        run: |
          npx --yes playwright install --with-deps chromium
          sudo apt-get install -y ffmpeg

      - name: Authenticate DevHub
        run: sf org login sfdx-url --set-default-dev-hub --sfdx-url-stdin <<< "${{ secrets.SFDX_AUTH_URL }}"

      # Cached per-PR scratch org auth. Cache hit → create-scratch-org.sh
      # re-logs in and skips provisioning. Cache miss → full provision.
      - name: Restore scratch org auth from cache
        uses: actions/cache@v5
        with:
          path: /tmp/sfdx-auth-${{ env.SCRATCH_ORG_ALIAS }}.url
          key: scratch-auth-${{ env.SCRATCH_ORG_ALIAS }}

      - name: Provision or restore scratch org
        run: HEADLESS=true ./scripts/create-scratch-org.sh

      - name: Do the work
        uses: anthropics/claude-code-action@v1
        timeout-minutes: 45
        id: claude
        with:
          prompt: |
            Follow the `salesforce-ai-tools:sf-ticket-to-pr` plugin skill — Steps 2-4.

            Context: ${{ env.KIND }} #${{ env.NUMBER }} in ${{ github.repository }}.
            Scratch org alias: ${{ env.SCRATCH_ORG_ALIAS }}

            Triage is done. A human approved this plan:

            --- Plan ---
            ${{ needs.triage.outputs.plan }}
            --- End plan ---

            Read the full thread for context, then code, verify, and ship.
          claude_args: "--max-turns 90 --model claude-sonnet-4-6 --permission-mode bypassPermissions"
          show_full_output: "true"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Report AI cost
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.triage.outputs.scratch_key }}
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: .sf-ai-tools/.github/scripts/report-ai-cost.sh || echo "::warning::cost report failed"

      - name: Prepare metadata learning context
        if: always()
        env:
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "Run: $RUN_URL"
            echo "Issue/PR: $KIND #$NUMBER"
            echo "Scratch org: $SCRATCH_ORG_ALIAS"
            echo "Claude execution file: ${EXECUTION_FILE:-}"
            echo
            echo "Filtered transcript lines:"
            if [ -n "${EXECUTION_FILE:-}" ] && [ -f "$EXECUTION_FILE" ]; then
              jq -r '.. | strings?' "$EXECUTION_FILE" \
                | grep -Ei 'salesforce|metadata|deploy|retrieve|flexipage|layout|quick.?action|object-meta|actionOverrides|error|failed|failure|exception|timeout|cancel|websearch|webfetch' \
                | tail -n 500 || true
            else
              echo "No Claude execution file found."
            fi
          } > /tmp/butler-metadata-learning-context.txt

      - name: Extract metadata learnings
        if: always()
        uses: anthropics/claude-code-action@v1
        timeout-minutes: 5
        with:
          prompt: |
            You are the post-run learning extractor for the Salesforce Butler pipeline.

            Do not implement the ticket. Do not deploy. Do not open a PR. Only inspect
            the completed/failed/canceled run state and preserve Salesforce metadata
            learnings in the existing local knowledge format.

            Read:
            - Filtered run context: `/tmp/butler-metadata-learning-context.txt`
            - `plugins/salesforce-ai-tools/skills/sf-ticket-to-pr/SKILL.md`
            - `plugins/salesforce-ai-tools/skills/sf-ticket-to-pr/knowledge/salesforce-metadata/INDEX.md`
            - routed knowledge files under `plugins/salesforce-ai-tools/skills/sf-ticket-to-pr/knowledge/salesforce-metadata/`

            If the run contains no Salesforce metadata deploy/debug/research learning,
            run `echo "No metadata learning found."` and stop.

            If the run contains a Salesforce metadata learning, update the matching
            knowledge file, or create the smallest matching file if none exists. Use
            the existing entry shape exactly: Error, Likely Cause, Fix, Validation,
            Source, Trust, Confirmed. `Trust` must be `AI-observed, not human-reviewed`.
            `Validation` must truthfully describe what happened in this run, including
            failed, canceled, or incomplete outcomes.

            If you changed knowledge files, commit and push only those knowledge-file
            changes to the current branch with message:

                Record Salesforce metadata learning from run ${{ github.run_id }}

            Then post one concise GitHub comment on ${{ env.KIND }} #${{ env.NUMBER }}
            saying what learning was recorded. If no learning was found, do not comment.
          claude_args: "--max-turns 15 --model claude-sonnet-4-6 --permission-mode bypassPermissions"
          show_full_output: "true"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload verification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-${{ github.run_id }}
          path: |
            .verification/**
            .playwright-mcp/**
            playwright-report/**
            test-results/**
          if-no-files-found: ignore

      - name: Notify on execute failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUMBER: ${{ needs.triage.outputs.number }}
          KIND: ${{ needs.triage.outputs.kind }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$KIND" = "pr" ]; then
            gh pr comment "$NUMBER" --repo ${{ github.repository }} --body "I couldn't finish — the run errored. See the [run logs]($RUN_URL). Mention me again to retry."
          else
            gh issue comment "$NUMBER" --repo ${{ github.repository }} --body "I couldn't finish — the run errored. See the [run logs]($RUN_URL). Mention me again to retry."
          fi
