<template>
    <lightning-card title="Support Note">
        <div class="slds-p-around_medium">
            <lightning-textarea
                label="Note"
                value={noteText}
                onchange={handleChange}
            ></lightning-textarea>
            <div class="slds-m-top_small">
                <lightning-button
                    label="Save"
                    variant="brand"
                    onclick={handleSave}
                ></lightning-button>
            </div>
        </div>
    </lightning-card>
</template>
